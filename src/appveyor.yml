image: Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- pwsh: |
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -OutFile "./dotnet-install.ps1"
      ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
- dotnet build src --configuration Release
- pwsh: |
      $projects = @(
        'LocalDb.Tests'
        'EfClassicLocalDb.Tests'
        'EfLocalDb.Tests'
        'EfLocalDb.NUnit.Tests'
        'EfLocalDb.MSTest.Tests'
        'EfLocalDb.Xunit.V3.Tests'
        'EfLocalDb.TUnit.Tests'
      )
      # xunit.v3 uses its own command line rather than the Microsoft.Testing.Platform
      # one, so --report-trx is not a valid option for it.
      $noTrx = @(
        'EfLocalDb.Xunit.V3.Tests'
      )
      $failed = @()
      foreach ($project in $projects)
      {
        Write-Host "::: $project"
        # Assigned this way rather than via an if expression: that returns a bare
        # string for a single element, and splatting a string passes it one character
        # at a time.
        $trxArgs = @()
        if ($noTrx -notcontains $project)
        {
          $trxArgs = @('--report-trx')
        }
        dotnet test --project "src/$project" --configuration Release --no-build --no-restore @trxArgs
        if ($LASTEXITCODE -ne 0)
        {
          $failed += $project
        }
        sqllocaldb info | ForEach-Object { sqllocaldb stop $_ ; sqllocaldb delete $_ }
      }
      if ($failed.Count -gt 0)
      {
        throw "Failed test projects: $($failed -join ', ')"
      }
on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
test: off
on_finish:
- pwsh: |
    $url = "https://ci.appveyor.com/api/testresults/mstest/$env:APPVEYOR_JOB_ID"
    $client = [System.Net.WebClient]::new()
    foreach ($trx in Get-ChildItem -Recurse -Filter *.trx -ErrorAction SilentlyContinue)
    {
      Write-Host "Uploading $($trx.FullName)"
      $client.UploadFile($url, $trx.FullName)
    }
artifacts:
- path: nugets\*.nupkg